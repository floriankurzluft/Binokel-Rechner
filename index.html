<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binokel Rechen-App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <section id="startScreen" class="screen start-screen active">
      <div class="brand-pill">Binokel Rechen-App</div>
      <h1>Spielmodus wählen</h1>
      <p class="subtitle">Wähle zuerst, ob ihr mit 3 Spielern oder mit 4 Spielern spielt.</p>

      <div class="mode-grid">
        <button class="mode-card" data-mode="3">
          <span class="mode-icon">👤👤👤</span>
          <span class="mode-title">3 Spieler</span>
          <span class="mode-text">Einzelwertung für 3 Spieler</span>
        </button>

        <button class="mode-card" data-mode="4">
          <span class="mode-icon">👥 vs 👥</span>
          <span class="mode-title">4 Spieler </span>
          <span class="mode-text">Teamwertung für Team 1 und Team 2</span>
        </button>
      </div>
    </section>

    <section id="gameScreen" class="screen game-screen">
      <div class="topbar">
        <div>
          <div class="brand-pill small">Binokel</div>
          <h2 id="gameTitle">Wertung</h2>
          <p id="gameSubtitle" class="subtitle small"></p>
        </div>
        <button id="backBtn" class="secondary-btn">← Modus wechseln</button>
      </div>

      <div class="panel input-panel">
        <div class="field-grid">
          <label>
            Reizwert
            <input type="number" id="reizwert" min="0" value="0" />
          </label>

          <label>
            <span id="macherLabel">Spieler macht das Spiel</span>
            <select id="spielerIndex"></select>
          </label>
        </div>
      </div>

      <div class="panel table-panel">
        <div class="table-scroll">
          <table id="scoreTable">
            <thead>
              <tr>
                <th id="entityHeader">Spieler</th>
                <th>Meldung</th>
                <th>Gestochene</th>
                <th>Gesamtpunkte</th>
              </tr>
            </thead>
            <tbody id="scoreTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="actions">
        <button id="berechnenBtn" class="primary-btn">Runde berechnen</button>
        <button id="resetBtn" class="secondary-btn danger">Spiel zurücksetzen</button>
      </div>

      <div class="panel history-panel">
        <div class="history-header">
          <h3>Rundenübersicht</h3>
          <span id="roundBadge" class="round-badge">Runde 1</span>
        </div>
        <div class="history-wrapper">
          <table class="history-table">
            <thead>
              <tr id="historyHeaderRow"></tr>
            </thead>
            <tbody id="history"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <div id="winnerModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="trophy">🏆</div>
      <h2 id="winnerTitle">Gewonnen!</h2>
      <p id="winnerText"></p>
      <div class="modal-actions">
        <button id="winnerCloseBtn" class="primary-btn">Weiter</button>
      </div>
      <div class="confetti-layer" id="confettiLayer"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
